version: "3.9"
# ╔══════════════════════════════════════════════════════════════════╗
# ║         ServerHardenPro — Docker Compose v0.4                   ║
# ║  Uso: docker compose up -d --build                               ║
# ║  Panel: http://TU_IP:8010                                        ║
# ║  API:   http://TU_IP:8010/docs                                   ║
# ╚══════════════════════════════════════════════════════════════════╝
services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: shp_backend
    ports:
      - "8010:8000"
    volumes:
      - ./backend:/app
      - ./frontend:/app/../frontend
    environment:
      - DB_PATH=/app/shp_database.db
      - SHP_JWT_SECRET=shp-change-this-secret-in-production
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\" || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

volumes:
  shp_data:
    driver: local
