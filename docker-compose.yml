version: "3.9"
# ╔══════════════════════════════════════════════════════════════════╗
# ║         ServerHardenPro — Docker Compose v0.5                   ║
# ║  Uso: docker compose up -d --build                               ║
# ║  Panel: https://TU_IP  (HTTPS — puerto 443)                     ║
# ║  API:   https://TU_IP/docs                                       ║
# ╚══════════════════════════════════════════════════════════════════╝

services:

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: shp_backend
    expose:
      - "8000"
    volumes:
      - ./backend:/app
      - ./frontend:/app/../frontend
    environment:
      - DB_PATH=/app/shp_database.db
      - SHP_JWT_SECRET=shp-change-this-secret-in-production
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\" || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - shp_net

  nginx:
    image: nginx:alpine
    container_name: shp_nginx
    ports:
      - "443:443"
      - "80:80"
    volumes:
      - ./nginx/conf/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - shp_net

networks:
  shp_net:
    driver: bridge

volumes:
  shp_data:
    driver: local
