version: "3.9"
# ╔══════════════════════════════════════════════════════════════════╗
# ║         ServerHardenPro — Docker Compose v0.6                   ║
# ║  Uso: docker compose up -d --build                               ║
# ║  Panel: https://TU_IP  (HTTPS — puerto 443)                     ║
# ║  API:   https://TU_IP/docs                                       ║
# ╚══════════════════════════════════════════════════════════════════╝

services:

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: shp_backend
    expose:
      - "8000"
    volumes:
      - ./backend:/app
      - ./frontend:/app/../frontend
    environment:
      - DB_PATH=/app/shp_database.db
      - SHP_JWT_SECRET=shp-change-this-secret-in-production
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\" || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - shp_net

  nginx:
    image: nginx:alpine
    container_name: shp_nginx
    ports:
      - "443:443"
      - "80:80"
    volumes:
      - ./nginx/conf/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      backend:
        condition: service_healthy
      crowdsec:
        condition: service_started
    restart: unless-stopped
    networks:
      - shp_net

  crowdsec:
    image: crowdsecurity/crowdsec:latest
    container_name: shp_crowdsec
    environment:
      - COLLECTIONS=crowdsecurity/nginx
      - GID=1000
    volumes:
      - ./crowdsec/acquis.yaml:/etc/crowdsec/acquis.yaml:ro
      - crowdsec_db:/var/lib/crowdsec/data
      - crowdsec_config:/etc/crowdsec
      - nginx_logs:/var/log/nginx:ro
    restart: unless-stopped
    networks:
      - shp_net

  crowdsec-bouncer:
    image: fbonalair/traefik-crowdsec-bouncer:latest
    container_name: shp_bouncer
    environment:
      - CROWDSEC_BOUNCER_API_KEY=shp-bouncer-key-change-this
      - CROWDSEC_AGENT_HOST=crowdsec:8080
    depends_on:
      - crowdsec
    restart: unless-stopped
    networks:
      - shp_net

networks:
  shp_net:
    driver: bridge

volumes:
  shp_data:
    driver: local
  nginx_logs:
    driver: local
  crowdsec_db:
    driver: local
  crowdsec_config:
    driver: local
